name: Sidra Pulse Scraper & Dashboard

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0
          cache: true

      - run: pnpm install --ignore-scripts

      - name: Run Scraper (One-Shot)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ROADMAP_WEBHOOK_URL: ${{ secrets.ROADMAP_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROADMAP_URLS: ${{ secrets.ROADMAP_URLS || 'https://sidrachain.com,https://ledger.sidrachain.com' }}
          NITTER_INSTANCES: ${{ secrets.NITTER_INSTANCES || 'xcancel.com,nitter.net,nitter.kavin.rocks' }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL || 'sidrachaincoin' }}
          RUN_ONCE: 'true'
        run: pnpm run dev

      - name: Commit and Push State File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --staged --quiet; then
            echo "No state changes detected. Skipping commit."
          else
            git commit -m "chore: update scraper state [skip ci]"
            git push
          fi
