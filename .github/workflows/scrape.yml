name: Sidra Pulse Scraper & Dashboard

on:
  schedule:
    - cron: '*/15 * * * *' # Run every 15 minutes
  workflow_dispatch:      # Allow manual triggers from the GitHub Actions tab

# Set permissions for GITHUB_TOKEN to allow writing state file commits and deploying to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Run Scraper (One-Shot)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NITTER_INSTANCES: ${{ secrets.NITTER_INSTANCES || 'nitter.cz,nitter.poast.org,nitter.no-logs.otf.gg' }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL || 'SidraChain_Official' }}
          RUN_ONCE: 'true'
        run: pnpm run dev

      - name: Commit and Push State File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --staged --quiet; then
            echo "No state changes detected. Skipping commit."
          else
            git commit -m "chore: update scraper state [skip ci]"
            git push
          fi

      - name: Build Web Dashboard
        run: pnpm run build:web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
