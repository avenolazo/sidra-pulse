name: Sidra Pulse Scraper & Dashboard

on:
  schedule:
    - cron: '*/15 * * * *' # Run every 15 minutes
  workflow_dispatch:      # Allow manual triggers from the GitHub Actions tab

# Set permissions for GITHUB_TOKEN to allow writing state file commits
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install pnpm
        run: npm install -g pnpm@11.4.0

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Run Scraper (One-Shot)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ROADMAP_WEBHOOK_URL: ${{ secrets.ROADMAP_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ROADMAP_URLS: ${{ secrets.ROADMAP_URLS || 'https://sidrachain.com' }}
          NITTER_INSTANCES: ${{ secrets.NITTER_INSTANCES || 'nitter.cz,nitter.poast.org,nitter.no-logs.otf.gg' }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL || 'SidraChain_Official' }}
          RUN_ONCE: 'true'
        run: pnpm run dev

      - name: Commit and Push State File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --staged --quiet; then
            echo "No state changes detected. Skipping commit."
          else
            git commit -m "chore: update scraper state [skip ci]"
            git push
          fi
